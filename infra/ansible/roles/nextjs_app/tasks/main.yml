---
# tasks file for nextjs_app
- name: Create app directory
  become: true
  file:
    path: /srv/app
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
- name: Sync app source to target
  synchronize:
    src: "{{ playbook_dir }}/../../../"   # project root
    dest: /srv/app/
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.next"
      - "--exclude=.git"
- name: install deps
  shell: cd /srv/app/ && yarn install 
- name: build app
  shell: cd /srv/app/ && yarn build
- name: copy static assets into standalone
  shell: cp -r /srv/app/.next/static /srv/app/.next/standalone/.next/static
- name: copy public folder into standalone
  shell: cp -r /srv/app/public /srv/app/.next/standalone/public
- name: run app
  shell: pm2 delete yahtzee 2>/dev/null; pm2 start .next/standalone/server.js --name yahtzee
  args:
    chdir: /srv/app
- name: Save pm2 process list
  shell: pm2 save
  args:
    chdir: /srv/app
- name: Configure pm2 to start on boot
  become: true
  shell: env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
- name: Enable pm2 systemd service
  become: true
  systemd:
    name: pm2-ubuntu
    enabled: true
    state: started
    daemon_reload: true
